# Refresh web/assets/bot-stats.json from Discord (hourly).
# Requires repo secret DISCORD_TOKEN (same bot token as Railway).
# Pushing the JSON triggers Deploy website → GitHub Pages.
name: Update bot stats

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bot-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch stats from Discord
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: python3 .github/scripts/fetch_bot_stats.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/assets/bot-stats.json
          if git diff --staged --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "Update live bot stats for website."
          git push
