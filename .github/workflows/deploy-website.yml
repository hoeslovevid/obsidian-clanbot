# Publish web/ to GitHub Pages (obsidianoverseer.com via web/CNAME).
# Repo Settings → Pages → Source: GitHub Actions.
name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Retry deploy (attempt 2)
        if: steps.deployment.outcome == 'failure'
        id: deployment2
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Retry deploy (attempt 3)
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        id: deployment3
        uses: actions/deploy-pages@v4

      - name: Fail if deploy did not succeed
        if: >-
          steps.deployment.outcome == 'failure' &&
          steps.deployment2.outcome == 'failure' &&
          steps.deployment3.outcome == 'failure'
        run: |
          echo "GitHub Pages deploy failed after 3 attempts."
          exit 1
