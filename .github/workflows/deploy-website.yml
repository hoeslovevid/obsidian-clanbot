# Publish web/ to GitHub Pages (obsidianoverseer.com via web/CNAME).
# Repo Settings → Pages → Source: GitHub Actions.
name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch live bot stats into site bundle
        continue-on-error: true
        run: |
          python3 <<'PY'
          import json
          import urllib.error
          import urllib.request

          out_path = "web/assets/bot-stats.json"
          urls = [
              "https://worker-production-39bd.up.railway.app/api/stats",
              "https://worker-production-39bd.up.railway.app/api/health",
          ]
          data = None
          for url in urls:
              try:
                  with urllib.request.urlopen(url, timeout=20) as resp:
                      payload = json.load(resp)
                  if payload.get("guild_count") is not None or payload.get("user_count") is not None:
                      data = {
                          "guild_count": payload.get("guild_count"),
                          "user_count": payload.get("user_count"),
                          "updated_at": payload.get("updated_at"),
                      }
                      break
              except (urllib.error.URLError, urllib.error.HTTPError, TimeoutError, json.JSONDecodeError):
                  continue

          if data is None:
              try:
                  with open(out_path, encoding="utf-8") as f:
                      data = json.load(f)
              except (OSError, json.JSONDecodeError):
                  data = {"guild_count": None, "user_count": None, "updated_at": None}

          with open(out_path, "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          print("bot-stats.json:", json.dumps(data))
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Retry deploy (attempt 2)
        if: steps.deployment.outcome == 'failure'
        id: deployment2
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Retry deploy (attempt 3)
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        id: deployment3
        uses: actions/deploy-pages@v4

      - name: Fail if deploy did not succeed
        if: >-
          steps.deployment.outcome == 'failure' &&
          steps.deployment2.outcome == 'failure' &&
          steps.deployment3.outcome == 'failure'
        run: |
          echo "GitHub Pages deploy failed after 3 attempts."
          exit 1
