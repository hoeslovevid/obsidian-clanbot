# Publish web/ to GitHub Pages (obsidianoverseer.com via web/CNAME).
# Repo Settings → Pages → Source: GitHub Actions.
name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "core/changelog.py"
      - "core/config.py"
      - ".github/scripts/export_changelog.py"
      - ".github/scripts/export_wfm_items.py"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh bot stats from Discord
        continue-on-error: true
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: |
          if [ -z "$DISCORD_TOKEN" ]; then
            echo "DISCORD_TOKEN secret not set — keeping existing bot-stats.json"
            exit 0
          fi
          python3 .github/scripts/fetch_bot_stats.py

      - name: Export changelog for website
        continue-on-error: true
        env:
          DISCORD_TOKEN: changelog-export-placeholder
        run: python3 .github/scripts/export_changelog.py

      - name: Export Warframe Market item catalog
        continue-on-error: true
        run: python3 .github/scripts/export_wfm_items.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Retry deploy (attempt 2)
        if: steps.deployment.outcome == 'failure'
        id: deployment2
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Retry deploy (attempt 3)
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        id: deployment3
        uses: actions/deploy-pages@v4

      - name: Fail if deploy did not succeed
        if: >-
          steps.deployment.outcome == 'failure' &&
          steps.deployment2.outcome == 'failure' &&
          steps.deployment3.outcome == 'failure'
        run: |
          echo "GitHub Pages deploy failed after 3 attempts."
          exit 1
