<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Changelog — Obsidian Overseer</title>
  <meta name="description" content="Release notes for Obsidian Overseer — website, dashboard, and bot updates." />
  <meta name="theme-color" content="#06070a" />
  <link rel="canonical" href="https://obsidianoverseer.com/changelog.html" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://obsidianoverseer.com/changelog.html" />
  <meta property="og:title" content="Changelog — Obsidian Overseer" />
  <meta property="og:description" content="What is new in Obsidian Overseer." />
  <meta property="og:image" content="https://obsidianoverseer.com/assets/og.jpg" />
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/site-nav.css" />
  <link rel="stylesheet" href="/assets/site.css" />
</head>
<body>
  <div class="bg-ambient" aria-hidden="true"></div>
  <div class="bg-grain" aria-hidden="true"></div>
  <div class="page-wrap">
    <nav id="site-nav" data-active="changelog"></nav>

    <header class="page-hero">
      <h1>Changelog</h1>
      <p>Synced from the bot release notes. In Discord, use <code>/whatsnew</code> for the live summary.</p>
    </header>

    <div id="changelog-root" class="prose-block">
      <p style="color: var(--text-subtle);">Loading…</p>
    </div>

    <footer id="site-footer"></footer>
  </div>
  <script src="/assets/config.js"></script>
  <script src="/assets/site.js"></script>
  <script>
    (function () {
      var root = document.getElementById("changelog-root");
      if (!root) return;
      fetch("/assets/changelog.json", { cache: "no-cache" })
        .then(function (r) {
          if (!r.ok) throw new Error("missing");
          return r.json();
        })
        .then(function (data) {
          var entries = (data && data.entries) || [];
          if (!entries.length) {
            root.innerHTML = "<p>No releases listed yet.</p>";
            return;
          }
          root.innerHTML = entries
            .map(function (e) {
              var meta = (e.date || "") + (e.current ? " · current" : "");
              var items = (e.changes || [])
                .map(function (c) {
                  return "<li>" + escapeHtml(c) + "</li>";
                })
                .join("");
              return (
                '<div class="changelog-entry"><h2>' +
                escapeHtml(e.version || "") +
                '</h2><p class="meta">' +
                escapeHtml(meta) +
                "</p><ul>" +
                items +
                "</ul></div>"
              );
            })
            .join("") +
            '<p class="meta" style="margin-top:8px;">Full history also lives in the bot via /whatsnew and /about.</p>';
        })
        .catch(function () {
          root.innerHTML =
            "<p>Could not load changelog. Try again later, or use <code>/whatsnew</code> in Discord.</p>";
        });

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
    })();
  </script>
</body>
</html>
